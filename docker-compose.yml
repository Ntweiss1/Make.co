version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: makeco_postgres
    environment:
      POSTGRES_USER: makeco_user
      POSTGRES_PASSWORD: makeco_password
      POSTGRES_DB: makeco
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U makeco_user']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: makeco_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: makeco_network
